<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: rgba(15, 23, 42, 0.94);
            padding: 28px;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }

        p {
            color: #cbd5e1;
            font-size: 14px;
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            margin-top: 12px;
            border: none;
            box-sizing: border-box;
        }

        input {
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
        }

        button {
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verify OTP</h2>
        <p>We sent a 6-digit code to <b>{{ email }}</b></p>

        <form action="/verify_otp" method="post">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="text" name="otp" placeholder="Enter 6-digit OTP" required>
            <button type="submit">Verify OTP</button>
        </form>
    </div>
</body>
</html>
