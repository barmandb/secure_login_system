<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            background: rgba(15, 23, 42, 0.92);
            padding: 36px;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }
        a {
            display: inline-block;
            margin-top: 16px;
            text-decoration: none;
            color: white;
            background: #2563eb;
            padding: 12px 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to Secure Dashboard 🔐</h1>
        <p>You have successfully logged in with OTP verification.</p>
        <a href="/logout">Logout</a>
    </div>
</body>
</html>
